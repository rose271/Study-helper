<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Main page</title>
    <link rel="stylesheet" href="mainpage.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

</head>
<body>
        <div id="sidebar-container"></div>
     <div class="main-content-wrapper">
    <div class="welcome_mes">
        <h2>Welcome, Back</h2>
    </div>
    <div>
    <div class="search-container">
         <input type="text" id="search_button" name="search" placeholder="Search by course name">
    </div>
    <!-- Create New Folder Button -->
<div class="text-center mt-4">
    <button class="create-folder-btn" data-bs-toggle="modal" data-bs-target="#createFolderModal">
        + Create New Folder
    </button>
</div>

<!-- Modal Popup Form -->
<div class="modal fade" id="createFolderModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title" style="font-family: 'Caveat', cursive;">Create New Folder</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <form id="folderForm">
          
          <div class="mb-3">
            <label class="form-label">Folder Name</label>
            <input type="text" class="form-control" id="folderName" placeholder="Enter folder name" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea class="form-control" id="folderDescription" rows="2" placeholder="Short description" required></textarea>
          </div>

          <button type="submit" class="btn btn-primary w-100">Create Folder</button>

        </form>
      </div>

    </div>
  </div>
</div>
<div class="modal fade" id="editFolderModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title" style="font-family: 'Caveat', cursive;">Edit Folder</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <form id="editFolderForm">
          <div class="mb-3">
            <label class="form-label">Folder Name</label>
            <input type="text" class="form-control" id="editFolderName" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea class="form-control" id="editFolderDescription" rows="2" required></textarea>
          </div>

          <button type="submit" class="btn btn-primary w-100">Save Changes</button>
        </form>
      </div>

    </div>
  </div>
</div>

<!-- Folder Cards Container -->
<div class="container mt-5">
    <div class="row" id="folderCardsRow">
        <!-- New folders will appear here -->
    </div>
</div>

    </div>
 


 <div class="container study-timeline">
    <h3 class="text_message">Study Timeline</h3>

    <!-- Month Labels -->
    <div class="months">
        <span>Jan</span>
        <span>Feb</span>
        <span>Mar</span>
        <span>Apr</span>
        <span>May</span>
        <span>Jun</span>
        <span>Jul</span>
        <span>Aug</span>
        <span>Sep</span>
        <span>Oct</span>
        <span>Nov</span>
        <span>Dec</span>
    </div>

    <!-- Calendar Grid -->
    <div class="calendar" id="calendar"></div>
</div>
</div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
    <script src="script_main.js"></script>
</body>
</html>
