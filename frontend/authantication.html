<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auth — NEXUS</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="auth.css">
</head>
<body>

<div class="container">
  <!-- Left editorial panel -->
  <div class="side-panel">
    <div class="brand">Study helper</div>
    <div class="side-tagline">
      <h2>Study smarter,<br><i>not harder —</i><br>start today.</h2>
      <p>Think of it as your academic mentor, always by your side.</p>
    </div>
  </div>

  <!-- Right form panel -->
  <div class="form-panel">
    <div class="tabs">
      <button class="tab-btn active" data-tab="login">Sign In</button>
      <button class="tab-btn" data-tab="signup">Create Account</button>
    </div>

    <!-- Login Form -->
    <div id="login" class="form-section active">
      <h1 class="form-title">Welcome back.</h1>
      <p class="form-subtitle">Sign in to continue where you left off.</p>

      <div class="field">
        <label for="login-email">Email address</label>
        <input type="email" id="login-email" placeholder="you@example.com">
      </div>

      <div class="field">
        <label for="login-pw">Password</label>
        <div class="password-wrap">
          <input type="password" id="login-pw" placeholder="••••••••">
          <button class="toggle-pw" data-target="login-pw">show</button>
        </div>
      </div>

      <a href="#" class="forgot">Forgot password?</a>

      <button class="submit-btn" data-type="login">
        <span>Sign In &nbsp;→</span>
      </button>

     </div> 

    <!-- Signup Form -->
    <div id="signup" class="form-section">
      <h1 class="form-title">Create account.</h1>
      <p class="form-subtitle">Get Started. Make this website as your personal study mentor. </p>

      <div class="field-row">
        <div class="field">
          <label for="first-name">First name</label>
          <input type="text" id="first-name" placeholder="Jane">
        </div>
        <div class="field">
          <label for="last-name">Last name</label>
          <input type="text" id="last-name" placeholder="Doe">
        </div>
      </div>

      <div class="field">
        <label for="signup-email">Email address</label>
        <input type="email" id="signup-email" placeholder="you@example.com">
      </div>

      <div class="field">
        <label for="signup-pw">Password</label>
        <div class="password-wrap">
          <input type="password" id="signup-pw" placeholder="Min. 8 characters">
          <button class="toggle-pw" data-target="signup-pw">show</button>
        </div>
      </div>

      <div class="field">
        <label for="signup-pw2">Confirm password</label>
        <div class="password-wrap">
          <input type="password" id="signup-pw2" placeholder="Repeat password">
          <button class="toggle-pw" data-target="signup-pw2">show</button>
        </div>
      </div>

      

      <button class="submit-btn" data-type="signup">
        <span>Create Account &nbsp;→</span>
      </button>

      
  </div>
</div>
</div>

<script src="auth.js"></script>
</body>
</html>
